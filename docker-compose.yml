version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: USER
      POSTGRES_PASSWORD: PASSWORD
      POSTGRES_DB: DATABASE
    volumes: postgres_data:/var/lib/postgresql/data

  nodejs_app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:

volumes:
  postgres_data: # Define the volume for persisting PostgreSQL data
